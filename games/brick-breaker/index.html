<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Brick Breaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* ==================== CSS DEFAULT (DESKTOP / HORIZONTAL) ==================== */
        body {
            background: linear-gradient(to bottom, #444, #222);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Press Start 2P', cursive, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .game-wrapper {
            /* Tata letak Horizontal untuk Desktop */
            display: flex;
            flex-direction: row; 
            width: 660px; /* 480px + 180px */
            height: 320px;
            border: 3px solid #666;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            background: #333;
        }

        .game-container {
            position: relative;
            background: 
                repeating-linear-gradient(45deg, #666, #666 5px, #555 5px, #555 10px),
                linear-gradient(to right, #777, #444);
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.8);
            width: 480px; /* Lebar Fixed */
            height: 320px; /* Tinggi Fixed */
        }
        
        /* Border kuning-hitam strip */
        .game-container::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 5px solid transparent;
            background: 
                repeating-linear-gradient(90deg, #ffcc00, #ffcc00 10px, black 10px, black 20px) top / 100% 5px,
                repeating-linear-gradient(90deg, #ffcc00, #ffcc00 10px, black 10px, black 20px) bottom / 100% 5px,
                repeating-linear-gradient(0deg, #ffcc00, #ffcc00 10px, black 10px, black 20px) left / 5px 100%,
                repeating-linear-gradient(0deg, #ffcc00, #ffcc00 10px, black 10px, black 20px) right / 5px 100%;
            background-repeat: no-repeat; pointer-events: none; z-index: 10;
        }

        #myCanvas { 
            display: block; position: relative; width: 480px; height: 320px; z-index: 5;
        }
        .touch-control-area { display: none; }
        
        /* === Sidebar Desktop (Vertikal) === */
        .sidebar {
            width: 180px; height: 320px; background: linear-gradient(to right, #555, #333);
            border-left: 3px solid #666; padding: 15px; display: flex; flex-direction: column;
            justify-content: flex-start; gap: 15px; box-shadow: inset 5px 0 10px rgba(0, 0, 0, 0.4);
        }
        .sidebar-item { background: #2a2a2a; border: 2px solid #555; border-radius: 5px; padding: 8px 10px; text-align: center; color: #eee; box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5); text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7); }
        .sidebar-label { font-size: 14px; color: #ffcc00; margin-bottom: 5px; text-transform: uppercase; }
        .sidebar-value { font-size: 24px; font-weight: bold; color: #ffcc00; }
        
        /* === Menu Pause (Styling tetap sama) === */
        .game-button { position: absolute; top: 10px; right: 10px; padding: 5px 10px; background-color: #ffcc00; color: black; border: 3px solid #ffaa00; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; z-index: 20; box-shadow: 0 4px #cc9900; transition: transform 0.1s; font-family: 'Press Start 2P', sans-serif; }
        .game-button:active { box-shadow: 0 1px #cc9900; transform: translateY(3px); }
        .overlay-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; }
        .overlay-menu h2 { color: #00BFFF; font-size: 32px; margin-bottom: 30px; text-shadow: 0 0 10px #00BFFF; }
        .menu-options { display: flex; flex-direction: column; gap: 15px; width: 80%; max-width: 300px; }
        .menu-button { padding: 12px; background-color: #333; color: #ffcc00; border: 3px solid #ffcc00; border-radius: 5px; cursor: pointer; font-family: 'Press Start 2P', sans-serif; font-size: 14px; transition: background-color 0.2s, color 0.2s; }
        .menu-button:hover { background-color: #ffcc00; color: black; }
        .sensitivity-control { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 10px; border: 1px solid #555; border-radius: 5px; background: #1a1a1a; color: #eee; font-size: 12px; }
        #sensitivitySlider { width: 100%; -webkit-appearance: none; height: 8px; background: #555; border-radius: 4px; }
        #sensitivitySlider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; background: #00BFFF; border: 2px solid #fff; border-radius: 50%; cursor: pointer; }
        #sensitivityValue { color: #00BFFF; font-weight: bold; }

        /* ==================== MEDIA QUERY: KHUSUS MOBILE VERTIKAL ==================== */
        @media (orientation: portrait) and (max-width: 768px) {
            
            body { padding: 5px; }

            .game-wrapper {
                /* Tata letak Vertikal (Game di atas, Sidebar di bawah) */
                flex-direction: column;
                width: 100%; 
                max-width: 480px; 
                height: auto;
                border-radius: 0;
                box-shadow: none; 
            }
            
            .game-container {
                /* Mengambil Lebar Penuh dan mempertahankan rasio 3:2 */
                width: 100%;
                height: 0;
                padding-bottom: 66.66%; 
                max-width: 100%;
            }

            #myCanvas {
                position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            }

            .sidebar {
                /* Sidebar di bawah, Horizontal, Full Width */
                width: 100%; height: auto; border-left: none; border-top: 3px solid #666;
                flex-direction: row; justify-content: space-around; align-items: center;
                padding: 10px 5px;
            }

            .sidebar-item { flex-grow: 1; margin: 0 5px; }
            .sidebar-value { font-size: 18px; }
            .sidebar-label { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-container">
            <div class="touch-control-area" id="touchControl"></div>
            <canvas id="myCanvas" width="480" height="320"></canvas>
            <button id="pauseButton" class="game-button">PAUSE / ESC</button>

            <div id="pauseMenu" class="overlay-menu" style="display: none;">
                <h2>GAME PAUSED</h2>
                <div class="menu-options">
                    <button id="resumeButton" class="menu-button">RESUME</button>
                    <button id="restartButton" class="menu-button">RESTART</button>
                    <div class="sensitivity-control">
                        <label for="sensitivitySlider">SENSITIVITY:</label>
                        <input type="range" id="sensitivitySlider" min="1" max="15" value="7">
                        <span id="sensitivityValue">7</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-item">
                <div class="sidebar-label">Score</div>
                <div class="sidebar-value" id="scoreDisplay">0</div>
            </div>
            <div class="sidebar-item">
                <div class="sidebar-label">Ammo</div>
                <div class="sidebar-value" id="ammoDisplay">0</div> 
            </div>
            <div class="sidebar-item">
                <div class="sidebar-label">Lives</div>
                <div class="sidebar-value" id="livesDisplay">3</div>
            </div>
            <div class="sidebar-item">
                <div class="sidebar-label">Hiscore</div>
                <div class="sidebar-value" id="hiscoreDisplay">0</div>
            </div>
        </div>
    </div>

    <script>
        /* ==================== JAVASCRIPT (KONTROL MOUSE/KEYBOARD + TOUCH/SLIDE) ==================== */
        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");

        // --- Variabel Konfigurasi Dasar ---
        const CANVAS_WIDTH = 480;
        const CANVAS_HEIGHT = 320;
        let animationFrameId;
        let isPaused = false;
        
        // --- Variabel Bola ---
        let x = CANVAS_WIDTH / 2; let y = CANVAS_HEIGHT - 30;
        let dx = 2; let dy = -2; 
        const ballRadius = 10;
        const initialBallSpeed = 2;

        // --- Variabel Paddle ---
        const paddleHeight = 10; const paddleWidth = 75;
        let paddleX = (CANVAS_WIDTH - paddleWidth) / 2;
        let paddleSensitivity = 7; 

        // --- Variabel Kontrol ---
        let rightPressed = false; let leftPressed = false;
        let isDragging = false; 

        // --- Variabel Bata ---
        const brickRowCount = 5; const brickColumnCount = 7;
        const brickWidth = 55; const brickHeight = 18;
        const brickPadding = 5; const brickOffsetTop = 40; const brickOffsetLeft = 25;
        let bricks = [];

        // --- Variabel Game State & DOM (Dihilangkan untuk brevity) ---
        let score = 0; let lives = 3; 
        let hiscore = localStorage.getItem('brickBreakerHiscore') || 0;
        const scoreDisplay = document.getElementById("scoreDisplay");
        const livesDisplay = document.getElementById("livesDisplay");
        const hiscoreDisplay = document.getElementById("hiscoreDisplay");
        const pauseButton = document.getElementById("pauseButton");
        const pauseMenu = document.getElementById("pauseMenu");
        const resumeButton = document.getElementById("resumeButton");
        const restartButton = document.getElementById("restartButton");
        const sensitivitySlider = document.getElementById("sensitivitySlider");
        const sensitivityValueDisplay = document.getElementById("sensitivityValue");

        // --- Inisialisasi & Reset (Dihilangkan untuk brevity) ---
        function initBricks() {
            bricks = [];
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 };
                }
            }
        }
        function resetBallAndPaddle() {
            x = CANVAS_WIDTH / 2; y = CANVAS_HEIGHT - 30;
            dx = initialBallSpeed * (dx > 0 ? 1 : -1); dy = -initialBallSpeed; 
            paddleX = (CANVAS_WIDTH - paddleWidth) / 2;
        }

        // --- Event Handler (Keyboard) ---
        function keyDownHandler(e) {
            if (e.key === "Right" || e.key === "ArrowRight") { rightPressed = true; } 
            else if (e.key === "Left" || e.key === "ArrowLeft") { leftPressed = true; } 
            else if (e.key === "Escape") { togglePause(); }
        }
        function keyUpHandler(e) {
            if (e.key === "Right" || e.key === "ArrowRight") { rightPressed = false; } 
            else if (e.key === "Left" || e.key === "ArrowLeft") { leftPressed = false; }
        }
        
        // --- Event Handler (Mouse) ---
        function mouseDownHandler() { isDragging = true; }
        function mouseUpHandler() { isDragging = false; }

        function mouseMoveHandler(e) {
            if (!isPaused) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const relativeX = e.clientX - rect.left;
                const canvasX = relativeX * scaleX; 
                
                if (canvasX > 0 && canvasX < CANVAS_WIDTH) {
                    paddleX = Math.max(0, Math.min(CANVAS_WIDTH - paddleWidth, canvasX - paddleWidth / 2));
                }
            }
        }
        
        // --- Event Handler (TOUCH/SLIDE) ---
        function touchMoveHandler(e) {
            if (isPaused || !e.touches || e.touches.length === 0) return;
            
            // Mencegah scrolling vertikal saat menggeser paddle
            e.preventDefault(); 
            
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            // Perhitungan Scaling sama dengan mouse
            const scaleX = canvas.width / rect.width;
            const relativeX = touch.clientX - rect.left;
            const canvasX = relativeX * scaleX; 

            if (canvasX > 0 && canvasX < CANVAS_WIDTH) {
                paddleX = Math.max(0, Math.min(CANVAS_WIDTH - paddleWidth, canvasX - paddleWidth / 2));
            }
        }

        // --- Setup Event Listener (LENGKAP) ---
        document.addEventListener("keydown", keyDownHandler, false);
        document.addEventListener("keyup", keyUpHandler, false);
        
        // Listener Mouse (Desktop)
        document.addEventListener("mousemove", mouseMoveHandler, false); 
        document.addEventListener("mousedown", mouseDownHandler, false);
        document.addEventListener("mouseup", mouseUpHandler, false);
        
        // Listener Touch (Mobile/Slide)
        canvas.addEventListener('touchmove', touchMoveHandler, { passive: false });
        // Touch start/end tidak terlalu dibutuhkan karena pergerakan dihandle oleh touchmove

        
        // --- Fungsi Kontrol Game State & Menu Pause (Dihilangkan untuk brevity) ---
        function togglePause() {
            if (lives > 0) { 
                isPaused = !isPaused;
                if (isPaused) { pauseMenu.style.display = "flex"; cancelAnimationFrame(animationFrameId); } 
                else { pauseMenu.style.display = "none"; draw(); }
            }
        }

        // Event Listener Menu (Dihilangkan untuk brevity)
        pauseButton.addEventListener("click", togglePause);
        resumeButton.addEventListener("click", togglePause);
        restartButton.addEventListener("click", () => { document.location.reload(); });
        sensitivitySlider.addEventListener("input", (e) => {
            paddleSensitivity = parseInt(e.target.value);
            sensitivityValueDisplay.textContent = paddleSensitivity;
        });

        // --- Fungsi Draw (Dihilangkan untuk brevity) ---
        function drawBall() {
            ctx.beginPath(); ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = "#FFDD00"; ctx.shadowColor = "#FFDD00"; ctx.shadowBlur = 8;
            ctx.fill(); ctx.closePath(); ctx.shadowBlur = 0;
        }
        function drawPaddle() {
            ctx.beginPath(); ctx.rect(paddleX, CANVAS_HEIGHT - paddleHeight, paddleWidth, paddleHeight);
            ctx.fillStyle = "#00BFFF"; ctx.shadowColor = "#00BFFF"; ctx.shadowBlur = 10;
            ctx.fill(); ctx.closePath(); ctx.shadowBlur = 0;
        }
        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const b = bricks[c][r];
                    if (b.status === 1) {
                        const brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                        const brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                        b.x = brickX; b.y = brickY;
                        ctx.beginPath(); ctx.rect(brickX, brickY, brickWidth, brickHeight);
                        ctx.fillStyle = "#CC0000"; ctx.strokeStyle = "#FF3333"; ctx.lineWidth = 2;
                        ctx.shadowColor = "#AA0000"; ctx.shadowBlur = 5;
                        ctx.fill(); ctx.stroke(); ctx.closePath(); ctx.shadowBlur = 0;
                    }
                }
            }
        }
        function updateSidebar() {
            scoreDisplay.textContent = score; livesDisplay.textContent = lives; hiscoreDisplay.textContent = hiscore;
        }

        // --- Logika Game & Collision (Dihilangkan untuk brevity) ---
        function collisionDetection() {
            let allBricksBroken = true;
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const b = bricks[c][r];
                    if (b.status === 1) {
                        allBricksBroken = false;
                        if (x + ballRadius > b.x && x - ballRadius < b.x + brickWidth && 
                            y + ballRadius > b.y && y - ballRadius < b.y + brickHeight) 
                        {
                            dy = -dy; b.status = 0; score += 10;
                            if (score > hiscore) { hiscore = score; localStorage.setItem('brickBreakerHiscore', hiscore); }
                        }
                    }
                }
            }
            if (allBricksBroken) {
                alert("SELAMAT, ANDA MENANG! Skor Akhir: " + score); document.location.reload();
            }
        }

        // --- Loop Utama Game (Dihilangkan untuk brevity) ---
        function draw() {
            if (isPaused) return; 

            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            drawBricks(); drawBall(); drawPaddle(); updateSidebar(); collisionDetection();
            
            // Tabrakan Dinding Kiri/Kanan & Atas
            if (x + dx > CANVAS_WIDTH - ballRadius || x + dx < ballRadius) { dx = -dx; }
            if (y + dy < ballRadius) { dy = -dy; } 
            
            // Tabrakan Bawah (Paddle atau Nyawa Hilang)
            else if (y + dy > CANVAS_HEIGHT - ballRadius - paddleHeight) {
                if (x > paddleX && x < paddleX + paddleWidth) {
                    let hitPoint = (x - (paddleX + paddleWidth / 2)) / (paddleWidth / 2);
                    dx = hitPoint * 3; dy = -dy;
                } else if (y + dy > CANVAS_HEIGHT - ballRadius) {
                    lives--;
                    if (lives === 0) {
                        alert("GAME OVER! Skor Akhir: " + score); document.location.reload();
                    } else {
                        resetBallAndPaddle();
                    }
                }
            }
            
            // Pergerakan Paddle (Keyboard Arrows)
            if (rightPressed && paddleX < CANVAS_WIDTH - paddleWidth) {
                paddleX += paddleSensitivity;
            } else if (leftPressed && paddleX > 0) {
                paddleX -= paddleSensitivity;
            }
            
            // Update posisi bola
            x += dx; y += dy;
            
            animationFrameId = requestAnimationFrame(draw);
        }

        // --- Jalankan Game ---
        initBricks();
        updateSidebar();
        draw();
    </script>
</body>
</html>
